<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result Checker</title>
</head>
<body>
  <script>
   const totalScore = 60;
   if (totalScore >= 80 && totalScore <= 100) {
    console.log("Excellent");
   } else
    if (totalScore >= 70 && totalScore < 80) {
      console.log("Very Good");
  } else
  if (totalScore >= 60 && totalScore < 70) {
    console.log("Good");
  } else
  if (totalScore >= 50 && totalScore < 60) {
    console.log("Fair");
  } else
  if (totalScore >= 0 && totalScore < 50) {
    console.log("poor");
  }
  </script>
</body>
</html>
